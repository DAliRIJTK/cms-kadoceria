name: Build and Push Docker Image to Azure

on:
  push:
    branches:
      - main # Workflow berjalan setiap kali ada push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repositori
        uses: actions/checkout@v3

      - name: Login ke Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        run: |
          # Membangun image Docker dari Dockerfile yang ada di repositorimu
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/aplikasi-ta:latest .
          
          # Mendorong image tersebut ke "garasi" Azure
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aplikasi-ta:latest
